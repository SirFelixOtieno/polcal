                        Ga.freq_interval: 0
                        Ga.respect_scan_boundaries: true
                     
                        K.type: delay
                        K.time_interval: 0 
                        K.freq_interval: 0
                        K.initial_estimate: true
                        K.respect_scan_boundaries: true
                        
