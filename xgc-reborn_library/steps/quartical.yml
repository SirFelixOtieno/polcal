         crosshand-phases:
         
               input_ms.time_chunk: 0
               input_ms.freq_chunk: 0
               input_ms.select_uv_range: [0,0]
               input_ms.group_by: [FIELD_ID,DATA_DESC_ID]  #,SCAN_NUMBER]
        
               input_model.recipe: #'{recipe.model-column}'
               input_model.apply_p_jones: true
               
               
               solver.propagate_flags: false
               solver.robust: false
               solver.threads: 8
       
               output.log_directory: '{recipe.qcaldir}/logs/{self.label}.qc'
               output.gain_directory: '{recipe.qcaldir}/gains/{self.label}.qc'
               output.overwrite: true
               output.products: [corrected_data, corrected_weight]
               output.columns: [CORRECTED_DATA, WEIGHT_SPECTRUM]
               output.flags: false
               output.apply_p_jones_inv: true
               output.net_gains: [G,K,B,D]
               mad_flags.enable: false
               dask.threads: 4
               dask.scheduler: threads
         
               
               
               
                   
         secondary:
            cab: quartical
            params:
               _use:  lib.params.quartical.secondary
               
               #solver.threads: 2
               #solver.robust: false
               #solver.propagate_flags: true
               
               mad_flags.enable: false 
               mad_flags.threshold_bl: 5
               mad_flags.max_deviation: 5
               mad_flags.whitening: disabled
               mad_flags.threshold_global: 5
               
               output.flags: false
               output.columns: [CORRECTED_DATA]
               output.products: [corrected_data]
               output.log_directory: '{recipe.qcaldir}/logs_transfer-target.qc'
               output.gain_directory: '{recipe.qcaldir}/gains_transfer-target.qc'
                  
         polarization:
            cab: quartical
            params:
               _use:  lib.params.quartical.polarization
               
               #solver.threads: 2
               #solver.robust: false
               #solver.propagate_flags: true
               
               output.flags: false
               output.columns: [CORRECTED_DATA]
               output.products: [corrected_data]
               output.log_directory: '{recipe.qcaldir}/logs_transfer-target.qc'
               output.gain_directory: '{recipe.qcaldir}/gains_transfer-target.qc'
               
         transfer-target:
            cab: quartical
            params:
               _use:  lib.params.quartical.transfer-target        
               
      selfcal:
      
         direction-independent:
            cab: quartical
            params:
               _use:  lib.params.quartical.selfcal
               
               
           
                   
     
         
         
        
               
               
               
               
              
               
               
              
     
     
             
   
   

