lib:
   steps: 
   
      imaging:
      
         1gc:
         
             clean1:
                cab: wsclean
                params:
                   prefix: '{recipe.imdir}/1gc'
                   _use:  lib.params.imaging.wsclean.image
                   
             mask1:
                cab: breizorro
                params:
                   _use: lib.params.imaging.breizorro
                   outfile: '{recipe.imdir}/1gc-MASK.fits'
                   restored-image: '{recipe.imdir}/1gc-MFS-image.fits' 
                   
             clean1-masked:
                cab: wsclean
                params:
                   prefix: '{recipe.imdir}/1gc.MASKED'
                   fits-mask: '{recipe.imdir}/1gc-MASK.fits'
                   _use:  lib.params.imaging.wsclean.image
                   
             predict1:
                cab: wsclean
                params:
                   prefix: '{recipe.imdir}/1gc'
                   _use: lib.params.imaging.wsclean.predict
