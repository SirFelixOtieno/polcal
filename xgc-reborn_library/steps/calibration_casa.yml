lib:
   steps:
      calibration: 
         primary:
         
            model: 
            
               setjy:
                  cab: casa.setjy
                  params:
                     field: '{recipe.obsconf.bpcal}'
                     ms: =recipe.steps.transform1-split_ms.outputvis
            
               crystalball:
                  cab: crystalball
                  params:
                     field: '{recipe.obsconf.bpcal}'
                     ms: =recipe.steps.transform1-split_ms.outputvis 
                     _use: lib.params.imaging.crystalball.bpcal     
                     
            prim-K0:
               cab: casa.gaincal    
               params:
                  field: '{recipe.obsconf.bpcal}'
                  caltable: '{recipe.caldir}/{self.label}'
                  _use: lib.params.calibration.gaincal.delay 
                  
            prim-G0:
               cab: casa.gaincal    
               params:
                  interp: [linear]
                  field: '{recipe.obsconf.bpcal}'
                  gainfield: ['{recipe.obsconf.bpcal}']
                  caltable: '{recipe.caldir}/{self.label}' 
                  gaintable: =LIST('{recipe.caldir}/prim-K0')
                  _use: lib.params.calibration.gaincal.gain
                  
            prim-B0:
               cab: casa.bandpass  
               params:
                  _use: lib.params.calibration.bandpass 
                  solnorm: false
                  interp: [linear,linear]
                  caltable: '{recipe.caldir}/{self.label}'
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}'] 
                  gaintable: =LIST('{recipe.caldir}/prim-G0','{recipe.caldir}/prim-K0')     
                  
            apply-prim0:
               cab: casa.applycal
               params: 
                  calwt: [false]
                  flagbackup: false
                  _use: lib.params.calibration.applycal.prim
                  interp: [linear,linear,linear] 
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}']     
                  gaintable: =LIST('{recipe.caldir}/prim-G0','{recipe.caldir}/prim-B0','{recipe.caldir}/prim-K0')
                  
            flag-prim:
            
               tfcrop:
                  cab: casa.flagdata
                  params: 
                     ntime: 'scan'
                     field: '{root.obsconf.bpcal}'
                     ms: =root.steps.transform1-split_ms.outputvis
                     freqcutoff:     =IFSET(recipe.crosscal.primary.flag.tfcrop.freqcutoff,     recipe.crosscal.primary.flag.tfcrop.freqcutoff,           3.0)
                     timecutoff:     =IFSET(recipe.crosscal.primary.flag.tfcrop.timecutoff,     recipe.crosscal.primary.flag.tfcrop.timecutoff,           4.0)
                     combinescans:   =IFSET(recipe.crosscal.primary.flag.tfcrop.combinescans,   recipe.crosscal.primary.flag.tfcrop.combinescans,       false)
                     usewindowstats: =IFSET(recipe.crosscal.primary.flag.tfcrop.usewindowstats, recipe.crosscal.primary.flag.tfcrop.usewindowstats,     'std')
                     flagdimension:  =IFSET(recipe.crosscal.primary.flag.tfcrop.flagdimension,  recipe.crosscal.primary.flag.tfcrop.flagdimension, 'freqtime')
                     extendflags:    =IFSET(recipe.crosscal.primary.flag.tfcrop.extendflags,    recipe.crosscal.primary.flag.tfcrop.extendflags,         true)
                     _use: lib.params.flagging.flagdata.tfcrop
                  
               rflag:
                  cab: casa.flagdata
                  params: 
                     ntime: 'scan'
                     field: '{root.obsconf.bpcal}'
                     ms: =root.steps.transform1-split_ms.outputvis
                     freqdevscale:     =IFSET(recipe.crosscal.primary.flag.rflag.freqdevscale,     recipe.crosscal.primary.flag.rflag.freqdevscale,      6.0)
                     timedevscale:     =IFSET(recipe.crosscal.primary.flag.rflag.timedevscale,     recipe.crosscal.primary.flag.rflag.timedevscale,      6.0)
                     winsize:          =IFSET(recipe.crosscal.primary.flag.rflag.winsize,          recipe.crosscal.primary.flag.rflag.winsize,             5)
                     spectralmax:      =IFSET(recipe.crosscal.primary.flag.rflag.spectralmax,      recipe.crosscal.primary.flag.rflag.spectralmax, 1000000.0)
                     spectralmin:      =IFSET(recipe.crosscal.primary.flag.rflag.spectralmin,      recipe.crosscal.primary.flag.rflag.spectralmin,       0.0)
                     extendflags:      =IFSET(recipe.crosscal.primary.flag.rflag.extendflags,      recipe.crosscal.primary.flag.rflag.extendflags,      true)
                     _use: lib.params.flagging.flagdata.rflag
                  
            prim-K1:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.gaincal.delay
                  field: '{recipe.obsconf.bpcal}'
                  interp: [linear,linear]
                  caltable: '{recipe.caldir}/{self.label}'
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}']
                  gaintable: =LIST('{recipe.caldir}/prim-G0','{recipe.caldir}/prim-B0') 
                  
            prim-G1:
               cab: casa.gaincal    
               params: 
                  _use: lib.params.calibration.gaincal.gain 
                  field: '{recipe.obsconf.bpcal}'  
                  interp: [linear,linear]
                  caltable: '{recipe.caldir}/{self.label}'
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}']
                  gaintable: =LIST('{recipe.caldir}/prim-B0','{recipe.caldir}/prim-K1')
                  
            prim-B1:
               cab: casa.bandpass  
               params:
                  _use: lib.params.calibration.bandpass 
                  interp: [linear,linear]
                  caltable: '{recipe.caldir}/{self.label}'
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}']
                  gaintable: =LIST('{recipe.caldir}/prim-G1','{recipe.caldir}/prim-K1')  
                  
            apply-prim1:
               cab: casa.applycal
               params: 
                  calwt: [false]
                  flagbackup: false
                  _use: lib.params.calibration.applycal.prim
                  interp: [linear,linear,linear] 
                  gainfield: [nearest,nearest,nearest]  
                  gaintable: =LIST('{recipe.caldir}/prim-G1','{recipe.caldir}/prim-B1','{recipe.caldir}/prim-K1') 
                                           
         secondary:
         
            model:
               cab: casa.setjy
               params:
                  reffreq: '1000MHz'
                  field: '{recipe.obsconf.gcal}'
                  ms: =recipe.steps.transform1-split_ms.outputvis 
                  
            sec-K0:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.gaincal.delay
                  field: '{recipe.obsconf.gcal}'
                  interp: [linear]
                  caltable: '{recipe.caldir}/{self.label}'
                  gainfield: ['{recipe.obsconf.bpcal}']
                  gaintable: =LIST('{recipe.caldir}/prim-B1')  
                             
            sec-G0:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.gaincal.gain
                  field: '{recipe.obsconf.gcal}'
                  interp: [linear,linear] 
                  caltable: '{recipe.caldir}/{self.label}'
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.gcal}'] 
                  gaintable: =LIST('{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K0') 
                  
            apply-sec0:
               cab: casa.applycal
               params: 
                  calwt: [false]
                  flagbackup: false
                  _use: lib.params.calibration.applycal.sec
                  interp: [linear,linear,linear]  
                  gainfield: ['{recipe.obsconf.gcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.gcal}']   
                  gaintable: =LIST('{recipe.caldir}/sec-G0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K0')  
                  
            flag-sec:
            
               tfcrop:
                  cab: casa.flagdata
                  params: 
                     ntime: 'scan'
                     field: '{root.obsconf.gcal}'
                     ms: =root.steps.transform1-split_ms.outputvis
                     freqcutoff:     =IFSET(recipe.crosscal.secondary.flag.tfcrop.freqcutoff,     recipe.crosscal.secondary.flag.tfcrop.freqcutoff,           3.0)
                     timecutoff:     =IFSET(recipe.crosscal.secondary.flag.tfcrop.timecutoff,     recipe.crosscal.secondary.flag.tfcrop.timecutoff,           4.0)
                     combinescans:   =IFSET(recipe.crosscal.secondary.flag.tfcrop.combinescans,   recipe.crosscal.secondary.flag.tfcrop.combinescans,       false)
                     usewindowstats: =IFSET(recipe.crosscal.secondary.flag.tfcrop.usewindowstats, recipe.crosscal.secondary.flag.tfcrop.usewindowstats,     'std')
                     flagdimension:  =IFSET(recipe.crosscal.secondary.flag.tfcrop.flagdimension,  recipe.crosscal.secondary.flag.tfcrop.flagdimension, 'freqtime')
                     extendflags:    =IFSET(recipe.crosscal.secondary.flag.tfcrop.extendflags,    recipe.crosscal.secondary.flag.tfcrop.extendflags,         true)
                     _use: lib.params.flagging.flagdata.tfcrop
                  
               rflag:
                  cab: casa.flagdata
                  params: 
                     ntime: 'scan'
                     field: '{root.obsconf.bpcal}'
                     ms: =root.steps.transform1-split_ms.outputvis
                     freqdevscale:     =IFSET(recipe.crosscal.secondary.flag.rflag.freqdevscale,     recipe.crosscal.secondary.flag.rflag.freqdevscale,      6.0)
                     timedevscale:     =IFSET(recipe.crosscal.secondary.flag.rflag.timedevscale,     recipe.crosscal.secondary.flag.rflag.timedevscale,      6.0)
                     winsize:          =IFSET(recipe.crosscal.secondary.flag.rflag.winsize,          recipe.crosscal.secondary.flag.rflag.winsize,             5)
                     spectralmax:      =IFSET(recipe.crosscal.secondary.flag.rflag.spectralmax,      recipe.crosscal.secondary.flag.rflag.spectralmax, 1000000.0)
                     spectralmin:      =IFSET(recipe.crosscal.secondary.flag.rflag.spectralmin,      recipe.crosscal.secondary.flag.rflag.spectralmin,       0.0)
                     extendflags:      =IFSET(recipe.crosscal.secondary.flag.rflag.extendflags,      recipe.crosscal.secondary.flag.rflag.extendflags,      true)
                     _use: lib.params.flagging.flagdata.rflag
              
            sec-K1:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.gaincal.delay
                  field: '{recipe.obsconf.gcal}'
                  interp: [linear,linear]
                  caltable: '{recipe.caldir}/{self.label}' 
                  gainfield: ['{recipe.obsconf.gcal}','{recipe.obsconf.bpcal}']
                  gaintable: =LIST('{recipe.caldir}/sec-G0','{recipe.caldir}/prim-B1') 
                  
            sec-G1:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.gaincal.gain
                  append: true
                  field: '{recipe.obsconf.gcal}'
                  interp: [linear,linear]
                  caltable: '{recipe.caldir}/prim-G1' 
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.gcal}']
                  gaintable: =LIST('{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1') 
                  
            sec-F0:
               cab: casa.fluxscale
               params:
                  reference: '{recipe.obsconf.fcal}' 
                  caltable: '{recipe.caldir}/prim-G1'
                  fluxtable: '{recipe.caldir}/sec-F0' 
                  _use: lib.params.calibration.fluxscale 
                  
            apply-sec1:
               cab: casa.applycal
               params: 
                  calwt: [false]
                  flagbackup: false
                  _use: lib.params.calibration.applycal.sec
                  interp: [linear,linear,linear]  
                  gainfield: ['{recipe.obsconf.gcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.gcal}']  
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1')           
            
         polarization:
            
            apply2pol:
               cab: casa.applycal
               params: 
                  calwt: [false]
                  _use: lib.params.calibration.applycal.pol
                  interp: [linear,linear,linear]  
                  gainfield: ['{recipe.obsconf.gcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.gcal}']  
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1')           
            
            flag-extend:
               cab: casa.flagdata
               params: 
                  datacolumn: 'DATA' 
                  ms: =root.steps.transform1-split_ms.outputvis
                  field: '{root.obsconf.bpcal},{root.obsconf.xcal}'
                  #field: '{root.obsconf.bpcal},{root.obsconf.gcal},{root.obsconf.xcal}'
                  ntime:        =IFSET(recipe.polcal.flag.extend.ntime,        recipe.polcal.flag.extend.ntime, '60s') 
                  growfreq:     =IFSET(recipe.polcal.flag.extend.growfreq,     recipe.polcal.flag.extend.growfreq, 80.0) 
                  growtime:     =IFSET(recipe.polcal.flag.extend.growtime,     recipe.polcal.flag.extend.growtime, 80.0)  
                  combinescans: =IFSET(recipe.polcal.flag.extend.combinescans, recipe.polcal.flag.extend.combinescans, true)
                  _use: lib.params.flagging.flagdata.extend
                  
            model:
               cab: casa.setjy
               params:
                  field: '{recipe.obsconf.xcal}'
                  ms: =recipe.steps.transform1-split_ms.outputvis 
                  
            pol-Gp0:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.polcal.phase
                  caltable: '{recipe.caldir}/{self.label}'
                  interp: [linear,linear,nearest]  
                  gainfield: [nearest,nearest,nearest]   
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1')           
            
            flag-pol:
            
               tfcrop:
                  cab: casa.flagdata
                  params: 
                     ntime: 'scan'
                     field: '{root.obsconf.xcal}'
                     ms: =root.steps.transform1-split_ms.outputvis
                     freqcutoff:     =IFSET(recipe.polcal.flag.tfcrop.freqcutoff,     recipe.polcal.flag.tfcrop.freqcutoff, 3.0)
                     timecutoff:     =IFSET(recipe.polcal.flag.tfcrop.timecutoff,     recipe.polcal.flag.tfcrop.timecutoff, 4.0)
                     combinescans:   =IFSET(recipe.polcal.flag.tfcrop.combinescans,   recipe.polcal.flag.tfcrop.combinescans, false)
                     usewindowstats: =IFSET(recipe.polcal.flag.tfcrop.usewindowstats, recipe.polcal.flag.tfcrop.usewindowstats, 'std')
                     flagdimension:  =IFSET(recipe.polcal.flag.tfcrop.flagdimension,  recipe.polcal.flag.tfcrop.flagdimension, 'freqtime')
                     extendflags:    =IFSET(recipe.polcal.flag.tfcrop.extendflags,    recipe.polcal.flag.tfcrop.extendflags,      true)
                     _use: lib.params.flagging.flagdata.tfcrop
                  
               rflag:
                  cab: casa.flagdata
                  params: 
                     ntime: 'scan'
                     field: '{root.obsconf.xcal}'
                     ms: =root.steps.transform1-split_ms.outputvis
                     freqdevscale:     =IFSET(recipe.polcal.flag.rflag.freqdevscale,     recipe.polcal.flag.rflag.freqdevscale,      6.0)
                     timedevscale:     =IFSET(recipe.polcal.flag.rflag.timedevscale,     recipe.polcal.flag.rflag.timedevscale,      6.0)
                     winsize:          =IFSET(recipe.polcal.flag.rflag.winsize,          recipe.polcal.flag.rflag.winsize,             5)
                     spectralmax:      =IFSET(recipe.polcal.flag.rflag.spectralmax,      recipe.polcal.flag.rflag.spectralmax, 1000000.0)
                     spectralmin:      =IFSET(recipe.polcal.flag.rflag.spectralmin,      recipe.polcal.flag.rflag.spectralmin,       0.0)
                     extendflags:      =IFSET(recipe.polcal.flag.rflag.extendflags,      recipe.polcal.flag.rflag.extendflags,      true)
                     _use: lib.params.flagging.flagdata.rflag
                     
            pol-KCROSS:
               cab: casa.gaincal    
               params:
                  _use: lib.params.calibration.polcal.xdelay
                  caltable: '{recipe.caldir}/{self.label}'
                  interp: [linear,linear,nearest,linear]  
                  gainfield: [nearest,nearest,nearest,'']   
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1','{recipe.caldir}/pol-Gp0')           
                           
            pol-Xf:
               cab: casa.polcal  
               params:
                  _use: lib.params.calibration.polcal.xphase
                  caltable: '{recipe.caldir}/{self.label}' 
                  spw: =recipe.polcal.calibrate.casa.clean_spw
                  interp: [linear,linear,nearest,linear,nearest]  
                  gainfield: [nearest,nearest,nearest,'','']   
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1','{recipe.caldir}/pol-Gp0','{recipe.caldir}/pol-KCROSS')           
                       
            pol-Xf1:
               cab: casa.polcal  
               params:
                  _use: lib.params.calibration.polcal.xphase
                  spw: ''
                  caltable: '{recipe.caldir}/{self.label}' 
                  interp: [linear,linear,nearest,linear,nearest,nearest]  
                  gainfield: [nearest,nearest,nearest,'','','']   
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1','{recipe.caldir}/pol-Gp0','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf')           
                  
            flag-Xf1:
            
               tfcrop:
                  cab: casa.flagdata
                  params: 
                     field: '{root.obsconf.xcal}'
                     ms:  =recipe.steps.pol-Xf1.caltable
                     freqcutoff:     =IFSET(recipe.polcal.flag.tfcrop.freqcutoff,     recipe.polcal.flag.tfcrop.freqcutoff, 3.0)
                     timecutoff:     =IFSET(recipe.polcal.flag.tfcrop.timecutoff,     recipe.polcal.flag.tfcrop.timecutoff, 4.0)
                     combinescans:   =IFSET(recipe.polcal.flag.tfcrop.combinescans,   recipe.polcal.flag.tfcrop.combinescans, true)
                     datacolumn:     =IFSET(recipe.polcal.flag.tfcrop.datacolumn,     recipe.polcal.flag.tfcrop.datacolumn, 'CPARAM')
                     usewindowstats: =IFSET(recipe.polcal.flag.tfcrop.usewindowstats, recipe.polcal.flag.tfcrop.usewindowstats, 'std')
                     flagdimension:  =IFSET(recipe.polcal.flag.tfcrop.flagdimension,  recipe.polcal.flag.tfcrop.flagdimension, 'freqtime')
                     _use: lib.params.flagging.flagdata.tfcrop
                  
               rflag:
                  cab: casa.flagdata
                  params: 
                     field: '{root.obsconf.xcal}'
                     ms: =recipe.steps.pol-Xf1.caltable
                     datacolumn:       =IFSET(recipe.polcal.flag.rflag.datacolumn,       recipe.polcal.flag.rflag.datacolumn,   'CPARAM')
                     freqdevscale:     =IFSET(recipe.polcal.flag.rflag.freqdevscale,     recipe.polcal.flag.rflag.freqdevscale,      6.0)
                     timedevscale:     =IFSET(recipe.polcal.flag.rflag.timedevscale,     recipe.polcal.flag.rflag.timedevscale,      6.0)
                     winsize:          =IFSET(recipe.polcal.flag.rflag.winsize,          recipe.polcal.flag.rflag.winsize,             5)
                     spectralmax:      =IFSET(recipe.polcal.flag.rflag.spectralmax,      recipe.polcal.flag.rflag.spectralmax, 1000000.0)
                     spectralmin:      =IFSET(recipe.polcal.flag.rflag.spectralmin,      recipe.polcal.flag.rflag.spectralmin,       0.0)
                     _use: lib.params.flagging.flagdata.rflag
                   
            prim-Df0:
               cab: casa.polcal  
               params:
                  _use: lib.params.calibration.polcal.leakages 
                  caltable: '{recipe.caldir}/{self.label}' 
                  interp: [linear,linear,linear,nearest,nearest,nearest]
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','','',''] 
                  gaintable: =LIST('{recipe.caldir}/prim-G1','{recipe.caldir}/prim-B1','{recipe.caldir}/prim-K1','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf','{recipe.caldir}/pol-Xf1') 
                  
            flag-Df0:
               cab: casa.flagdata
               params: 
                  clipoutside: true
                  clipzeros: 'false'
                  datacolumn: 'CPARAM'
                  ms: '{previous.caltable}'
                  _use: lib.params.flagging.flagdata.clip 
                  
            prim-Df1:
               cab: casa.polcal  
               params:
                  _use: lib.params.calibration.polcal.leakages      
                  caltable: '{recipe.caldir}/{self.label}'
                  interp: [linear,linear,linear,nearest,nearest,nearest]
                  gainfield: ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','','',''] 
                  gaintable: =LIST('{recipe.caldir}/prim-G1','{recipe.caldir}/prim-B1','{recipe.caldir}/prim-K1','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf','{recipe.caldir}/pol-Xf1') 
                  
            flag-Df1:
               cab: casa.flagdata
               params: 
                  clipoutside: true
                  clipzeros: 'false'
                  datacolumn: 'CPARAM'
                  ms: '{previous.caltable}'
                  _use: lib.params.flagging.flagdata.clip 
                   
         applycal:
         
            applycal2prim:
               cab: casa.applycal
               params: 
                  flagbackup: true
                  _use: lib.params.calibration.applycal.prim 
                  calwt: [false,false,false,false,false,false,false] 
                  interp: [linear,linear,linear,nearest,nearest,nearest,nearest] 
                  gainfield:  ['{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','{recipe.obsconf.bpcal}','','','','']   
                  gaintable: =LIST('{recipe.caldir}/prim-G1','{recipe.caldir}/prim-B1','{recipe.caldir}/prim-K1','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf','{recipe.caldir}/pol-Xf1','{recipe.caldir}/prim-Df1')
                  
            applycal2sec:
               cab: casa.applycal
               params: 
                  flagbackup: true
                  _use: lib.params.calibration.applycal.sec 
                  calwt: [false,false,false,false,false,false,false]
                  gainfield:  [nearest,nearest,nearest,'','','',''] 
                  interp: [linear,linear,nearest,nearest,nearest,nearest,nearest] 
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf','{recipe.caldir}/pol-Xf1','{recipe.caldir}/prim-Df1')  
                          
            applycal2pol:
               cab: casa.applycal
               params: 
                  flagbackup: true
                  _use: lib.params.calibration.applycal.pol
                  calwt: [false,false,false,true,false,false,false,false] 
                  interp: [linear,linear,nearest,linear,nearest,nearest,nearest,nearest]
                  gainfield: [nearest,nearest,nearest,'{recipe.obsconf.xcal}','','','',''] 
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1','{recipe.caldir}/pol-Gp0','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf','{recipe.caldir}/pol-Xf1','{recipe.caldir}/prim-Df1')        
                  
            applycal2target:
               cab: casa.applycal
               params: 
                  flagbackup: true
                  _use: lib.params.calibration.applycal.target
                  calwt: [false,false,false,false,false,false,false]
                  gainfield:  [nearest,nearest,nearest,'','','',''] 
                  interp: [linear,linear,nearest,nearest,nearest,nearest,nearest] 
                  gaintable: =LIST('{recipe.caldir}/sec-F0','{recipe.caldir}/prim-B1','{recipe.caldir}/sec-K1','{recipe.caldir}/pol-KCROSS','{recipe.caldir}/pol-Xf','{recipe.caldir}/pol-Xf1','{recipe.caldir}/prim-Df1')
                           
            
                  
            
                  
                 
    
   
  
  
  
