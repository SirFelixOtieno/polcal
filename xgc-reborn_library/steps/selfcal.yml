lib:
   steps:
      selfcal:
         quartical:
            
            phase-1:
               cab: quartical
               params:
                  _use: lib.params.selfcal.quartical
                  Gp.type: phase
                  Gp.solve_per: antenna
                  Gp.respect_scan_boundaries: true
                  Gp.time_interval:        =IFSET(recipe.selfcal.calibrate.quartical.gain.time_interval,                recipe.selfcal.calibrate.quartical.gain.time_interval,        1) 
                  Gp.freq_interval:        =IFSET(recipe.selfcal.calibrate.quartical.gain.freq_interval,                recipe.selfcal.calibrate.quartical.gain.freq_interval,        0)
                  
                  input_ms.freq_chunk:     =IFSET(recipe.selfcal.calibrate.quartical.input_ms.freq_chunk,               recipe.selfcal.calibrate.quartical.input_ms.freq_chunk,       0)
                  input_ms.time_chunk:     =IFSET(recipe.selfcal.calibrate.quartical.input_ms.time_chunk,               recipe.selfcal.calibrate.quartical.input_ms.time_chunk,      25)
                  
                  mad_flags.enable:        =IFSET(recipe.selfcal.calibrate.quartical.mad_flags.enable,                  recipe.selfcal.calibrate.quartical.mad_flags.enable,      false)
                  
            phase-2:
               cab: quartical
