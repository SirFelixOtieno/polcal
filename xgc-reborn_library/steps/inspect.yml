lib:
   steps:
      inspect:
      
         gains:
         
            prim:
            
               prim-K0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-K0' 
                     _use: lib.params.visualization.plotms.delay
                  
               prim-K1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-K1' 
                     _use: lib.params.visualization.plotms.delay
                  
               prim-G0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-G0'
                     _use: lib.params.visualization.plotms.gain
                  
               prim-G1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-G1'
                     _use: lib.params.visualization.plotms.gain
                    
               prim-B0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-B0' 
                     _use: lib.params.visualization.plotms.bandpass 
                  
               prim-B1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-B1'
                     _use: lib.params.visualization.plotms.bandpass   
                  
               prim-Df0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-Df0' 
                     _use: lib.params.visualization.plotms.leakages
                  
               prim-Df1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-Df1' 
                     _use: lib.params.visualization.plotms.leakages
            sec:
            
               sec-G0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/sec-G0'
                     _use: lib.params.visualization.plotms.gain
                  
               sec-G1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/prim-G1'
                     _use: lib.params.visualization.plotms.gain
                        
               sec-K0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/sec-K0'
                     _use: lib.params.visualization.plotms.delay
                  
               sec-K1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/sec-K1'
                     _use: lib.params.visualization.plotms.delay
                  
               sec-F0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/sec-F0'
                     _use: lib.params.visualization.plotms.gain
            
            pol:
          
               pol-Gp0:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/pol-Gp0'
                     _use: lib.params.visualization.plotms.phase
                     
               pol-Gp1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/pol-Gp1'
                     _use: lib.params.visualization.plotms.phase
                  
               pol-KCROSS:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/pol-KCROSS'
                     _use: lib.params.visualization.plotms.xdelay
                  
               pol-Xf:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/pol-Xf'
                     _use: lib.params.visualization.plotms.xphase
                  
               pol-Xf1:
                  cab: casa.plotms
                  params:
                     ms: '{root.caldir}/pol-Xf1'
                     _use: lib.params.visualization.plotms.xphase    
                  
         visibilities:
         
            freqbaseline:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.freqbaseline
                      
            ampbaseline:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.ampbaseline
                    
            ampchan:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.ampchan
                  
            ampscan:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.ampscan
                  
            phasechan:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.phasechan
                  
            phasescan:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.phasescan
                          
            ampphase:
               cab: shadems
               params:
                  corr: 'XX,YY'
                  _use: lib.params.visualization.shadems.ampphase
                  
            amptime:
               cab: shadems
               params:
                  corr: 'XX,YY'
                  _use: lib.params.visualization.shadems.amptime
                       
            phaseballs:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.phaseballs   
                    
            normballs:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.normballs   
                  
            phaseuvdist:
               cab: shadems
               params:
                  corr: 'XX,YY'
                  _use: lib.params.visualization.shadems.phaseuvdist
                      
            ampuvdist:
               cab: shadems
               params:
                  corr: 'XX,YY'
                  _use: lib.params.visualization.shadems.ampuvdist
                  
            realfreq:
               cab: shadems
               params:
                  corr: 'IQUV'
                  _use: lib.params.visualization.shadems.realfreq
                  
            phasefreq:
               cab: shadems
               params:
                  corr: 'XX,YY'
                  _use: lib.params.visualization.shadems.phasefreq
                  
            phasefreq1:
               cab: shadems
               params:
                  corr: 'XY,YX'
                  _use: lib.params.visualization.shadems.phasefreq
                   
            phasetime:
               cab: shadems
               params:
                  corr: 'XX,YY'
                  _use: lib.params.visualization.shadems.phasetime
                      
            uv:
               cab: shadems
               params:
                  _use: lib.params.visualization.shadems.uv    
                        
            ampfreq:
            
               data:
               
                  calibrators:
                     cab: shadems
                     params:
                        iter-field: true 
                        field: =recipe.steps.transform1-split_ms.field
                        ms:    =recipe.steps.transform1-split_ms.outputvis
                        dir:   =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/flagging'
                        _use: lib.params.visualization.shadems.ampfreq.data
                        
                  target:
                     cab: shadems
                     params:
                        field: =recipe.steps.transform2-split_ms.field
                        ms:    =recipe.steps.transform2-split_ms.outputvis
                        dir:   =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/flagging'
                        _use: lib.params.visualization.shadems.ampfreq.data
                              
                  target-corr:
                     cab: shadems
                     params:
                        field: =recipe.steps.transform3-split_ms.field
                        ms:    =recipe.steps.transform3-split_ms.outputvis
                        dir:   =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/flagging'
                        _use: lib.params.visualization.shadems.ampfreq.data
                        
               corrected:
                
                  calibrators:
                     cab: shadems
                     params:
                        _use: lib.params.visualization.shadems.ampfreq.corrected
                          
           
                              
               
                     
                     
    
    
    
      
    
   
   
   
   
   
   
   
  
    
   
   

