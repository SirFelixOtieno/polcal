lib:
  recipes:
  
    inspect-prim2:
      name: inspect-prim2
      info: A recipe for inspecting primary gain solutions
      
      assign:
            dirs.base: 
            dirs.temp: '{config.run.env.HOME}/tmp'
            log.dir: '{root.logdir}/log-{config.run.datetime}'
            
      inputs:
            field:
                 dtype: str 
            
      steps:
            
            plot1-prim-K0:
                  _use: lib.steps.inspect.gains.prim.prim-K0
                  info: Plot delay calibration solutions
                  params:
                        xaxis: 'antenna1'
                        plotfile: '{root.calplotdir}/prim-K0_antenna1.png'
                        
            plot2-prim-K0:
                  _use: lib.steps.inspect.gains.prim.prim-K0
                  info: Plot delay calibration solutions
                  params:
                        xaxis: 'time'
                        plotfile: '{root.calplotdir}/prim-K0_time.png'
                      
            plot1-prim-G0:
                  _use: lib.steps.inspect.gains.prim.prim-G0
                  info: Plot Gain phase calibration solutions
                  params:
                        yaxis: 'phase'
                        xaxis: 'time'
                        plotfile: '{root.calplotdir}/prim-Gp0_time.png'
                       
            plot2-prim-G0:
                  _use: lib.steps.inspect.gains.prim.prim-G0
                  info: Plot Gain phase calibration solutions
                  params:
                        yaxis: 'phase'
                        xaxis: 'antenna1'
                        plotfile: '{root.calplotdir}/prim-Gp0_antenna1.png'
                       
            plot3-prim-G0:
                  _use: lib.steps.inspect.gains.prim.prim-G0
                  info: Plot Gain amplitude calibration solutions
                  params:
                        xaxis: 'antenna1' 
                        yaxis: 'amplitude'
                        plotfile: '{root.calplotdir}/prim-Ga0_antenna1.png' 
                       
            plot4-prim-G0:
                  _use: lib.steps.inspect.gains.prim.prim-G0
                  info: Plot Gain amplitude calibration solutions
                  params:
                        xaxis: 'time'
                        yaxis: 'amplitude'
                        plotfile: '{root.calplotdir}/prim-Ga0_time.png' 
                        
            plot1-prim-B0:
                  _use: lib.steps.inspect.gains.prim.prim-B0
                  info: Plot Bandpass calibration solutions-amplitude
                  params:
                        yaxis: 'amp'
                        plotfile: '{root.calplotdir}/prim-B0_amp.png'
                       
            plot2-prim-B0:
                  _use: lib.steps.inspect.gains.prim.prim-B0
                  info: Plot bandpass calibration solutions
                  params:
                        yaxis: 'phase'
                        plotfile: '{root.calplotdir}/prim-B0_phase.png' 
                       
            plot1-prim-K1:
                  _use: lib.steps.inspect.gains.prim.prim-K1
                  info: Plot delay calibration solutions
                  params:
                        xaxis: 'antenna1'
                        plotfile: '{root.calplotdir}/prim-K1_antenna1.png'
                       
            plot2-prim-K1:
                  _use: lib.steps.inspect.gains.prim.prim-K1
                  info: Plot delay calibration solutions
                  params:
                        xaxis: 'time'
                        plotfile: '{root.calplotdir}/prim-K1_time.png'
                        
            plot1-prim-G1:
                  _use: lib.steps.inspect.gains.prim.prim-G1
                  info: Plot Gain phase calibration solutions
                  params:
                        yaxis: 'phase'
                        xaxis: 'time'
                        plotfile: '{root.calplotdir}/prim-Gp1_time.png'
                       
            plot2-prim-G1:
                  _use: lib.steps.inspect.gains.prim.prim-G1
                  info: Plot Gain phase calibration solutions
                  params:
                        yaxis: 'phase'
                        xaxis: 'antenna1'
                        plotfile: '{root.calplotdir}/prim-Gp1_antenna1.png'
                       
            plot3-prim-G1:
                  _use: lib.steps.inspect.gains.prim.prim-G1
                  info: Plot Gain amplitude calibration solutions
                  params:
                        xaxis: 'antenna1' 
                        yaxis: 'amplitude'
                        plotfile: '{root.calplotdir}/prim-Ga1_antenna1.png' 
                       
            plot4-prim-G1:
                  _use: lib.steps.inspect.gains.prim.prim-G1
