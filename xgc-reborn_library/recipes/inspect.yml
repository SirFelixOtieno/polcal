    inspect-crosscal:
      name: inspect-crosscal
      info: A recipe for inspecting cross calibration calibration solutions
      
      assign:
            dirs.base: 
            dirs.temp: '{config.run.env.HOME}/tmp'
            log.dir: '{root.logdir}/log-{config.run.datetime}'
            
      inputs:
            field:
                 dtype: str 
            
      steps:
      
            plot1-ampchan:
                  _use: lib.steps.inspect.visibilities.ampchan
                  info: Plot amplitude against channel 
                  params:
                        iter-field: true 
                        suffix: 'ampchan'
                        colour-by: 'ANTENNA1'
                        field: '{root.obsconf.bpcal},{root.obsconf.gcal}'
                        dir:    =STRIPEXT(BASENAME(root.ms-path)) + '/' + '{root.crosscal.calibrate-with}/output' + '/' + 'diagnostic-plots' + '/' + 'crosscal' + '/' + 'spectra'
                        
            plot2-ampchan:
                  _use: lib.steps.inspect.visibilities.ampchan
