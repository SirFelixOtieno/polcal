#!/usr/bin/env -S stimela run -l
_include:
          
   xgc-reborn_cabs:
      - xgc-reborn_cabs.yml
      
   xgc-reborn_vars:
      - xgc-reborn_vars.yml
        
opts:

   backend:
    
      select:
         - singularity
         - native
         
      rlimits:
         NOFILE: 100000 
     
   log:
    
      nest: 2
      level: INFO
      enable: true
      symlink: log
      name: log-{info.fqname}
      dir: 'logs/log-{config.run.datetime}'
        
xgc-reborn:

   name: xgc-reborn
   info: |
       A System-agnostic Pipeline for Polarization Calibration and Imaging for the MeerKAT Telescope
   assign:
      dirs.base: 
      dirs.temp: '{config.run.env.HOME}/temp'
      log.dir: '{recipe.logdir}/log-{config.run.datetime}'
                      
   assign_based_on:
      _include: 
         - xgc-reborn_obs.yml
            
   inputs:
      _include:
       
         - xgc-reborn_defaults/inputs/flag.yml
         - xgc-reborn_defaults/inputs/polcal.yml
         - xgc-reborn_defaults/inputs/selfcal.yml
         - xgc-reborn_defaults/inputs/prepare.yml
         - xgc-reborn_defaults/inputs/inspect.yml
         - xgc-reborn_defaults/inputs/obsconf.yml
         - xgc-reborn_defaults/inputs/crosscal.yml
         - xgc-reborn_defaults/inputs/image-pol.yml
         - xgc-reborn_defaults/inputs/transform.yml 
             
   outputs:
      _include: 
      
         - xgc-reborn_defaults/outputs/outputs.yml
        
   steps:
   
      obsinfo-listobs:
         _use: lib.steps.prepdata.listobs.ms
         info: |
             Generates a summary of the observation information in the Measurement Set, including fields, spectral windows, antennas, and scan details.
         params:
            listfile: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/obsinfo' + '/' + STRIPEXT(BASENAME(recipe.ms-path)) + '-obsinfo_ms.txt'
         skip: =IF(recipe.obsconf.obsinfo.enable, IF(recipe.obsconf.obsinfo.listobs.enable, false, true),true)
         
      obsinfo-plotants:
         _use: lib.steps.prepdata.plotants
         info: |
             Plot the antenna distribution in the local reference frame, showing the positions of antennas in the array layout to help visualize the telescope configuration. 
         params:
            figfile: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/obsinfo' + '/' + STRIPEXT(BASENAME(recipe.ms-path)) + '-plotants.png'
         skip: =IF(recipe.obsconf.obsinfo.enable, IF(recipe.obsconf.obsinfo.plotants.enable, false, true),true)
                        
      obsinfo-elevation1:
         _use: lib.steps.prepdata.elevation-time
         info: |
             Plot the elevation tracks of observed sources by displaying elevation versus time, allowing users to see how each source moves across the sky during the observation.
         params:
            plotfile: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/obsinfo' + '/' + STRIPEXT(BASENAME(recipe.ms-path)) + '-elevation1.png'
         skip: =IF(recipe.obsconf.obsinfo.enable, IF(recipe.obsconf.obsinfo.plotelev.enable, false, true),true)
         
      obsinfo-elevation2:
         _use: lib.steps.prepdata.elevation-hourangle
         info: |
             Plot elevation versus hour angle by selecting elevation for the y-axis and hour angle for the x-axis, allowing one to visualize how each source’s elevation changes with 
             its position relative  to the local meridian during the observation.
         params:
            plotfile: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/obsinfo' + '/' + STRIPEXT(BASENAME(recipe.ms-path)) + '-elevation2.png'
         skip: =IF(recipe.obsconf.obsinfo.enable, IF(recipe.obsconf.obsinfo.plotelev.enable, false, true),true)
                        
      transform1-split_ms:
         _use: lib.steps.prepdata.mstransform.calibrators
         info: |
             Create a new Measurement Set containing only the calibrator fields by selecting the desired field IDs or names, allowing one to isolate calibrator data from the original 
             dataset for calibration purposes.
         params:
            outputvis: =STRIPEXT(BASENAME(recipe.ms-path))+'/'+'{recipe.crosscal.calibrate-with}/msdir'+'/'+STRIPEXT(BASENAME(recipe.ms-path))+'-{recipe.transform.calibrators.label}.ms'
         skip: =IF(recipe.transform.calibrators.enable, IF(recipe.transform.calibrators.mstransform.enable, IF(recipe.transform.calibrators.field=="calibrators", false, true),true),true)
                        
      transform1-save-flags:
         _use: lib.steps.prepdata.flagmanager.save.calibrators
         info: |
             Back up the original flag information from the observatory using CASA flagmanager by saving the initial flag state of the Measurement Set before any processing 
             so it can be restored if needed later. 
         params:
            versionname:  'observatory-calflags'
            comment: 'original calibrator flags from the observatory'
         skip: =IF(recipe.transform.calibrators.enable, false, true)
         
      transform1-restore_flags:
         _use: lib.steps.prepdata.flagmanager.restore.calibrators
         info: |
             Restore the backed-up flags in CASA using the flagmanager task by loading the previously saved flag version of the Measurement Set, 
             returning the data to its original flag state from before processing.
         params:
            versionname: 'observatory-calflags'
         skip: =IF(recipe.transform.calibrators.enable, false, true)
             
      transform1-listobs:
         _use: lib.steps.prepdata.listobs.calibrators
         info: |
             Generates a summary of the observation information in the Measurement Set (calibrators-only), including fields, spectral windows, antennas, and scan details.
         params:
            listfile: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/obsinfo' + '/' + STRIPEXT(BASENAME(recipe.ms-path)) + '-obsinfo_cals.txt'
         skip: =IF(recipe.transform.calibrators.enable, IF(recipe.transform.calibrators.mstransform.enable, IF(recipe.transform.calibrators.obsinfo.enable, false,true),true),true)  
            
      prepare-summary_flags:
         _use: lib.steps.prepdata.flagdata.summary.calibrators
         info: |
             Produce a summary of the flagged data from the observatory by inspecting the Measurement Set flags to quantify how much data has been flagged and identify
              affected antennas, times, or channels.
         params: 
            mode: 'summary' 
         skip: =IF(recipe.prepare.calibrators.enable, IF(recipe.prepare.calibrators.flag.summary.enable, false, true),true) 
         
      prepare-delete1_flags:
         _use: lib.steps.prepdata.flagmanager.delete.calibrators
         info: |
             Delete the backed up flags
         params:
            versionname: 'unswapped-calflags'
         skip: =IF(recipe.prepare.calibrators.enable, false,true) 
         
      prepare-save_flags:
         _use: lib.steps.prepdata.flagmanager.save.calibrators
         info: |
             Back up the original flag information from the observatory using CASA flagmanager by saving the initial flag state of the Measurement Set (after restoring observatory flags) 
             before any processing so it can be restored if needed later. 
         params:
            versionname: 'unswapped-calflags'
         skip: =IF(recipe.prepare.calibrators.enable, false,true) 
                              
      prepare-swap_labels:
         _use: lib.steps.prepdata.swap-feeds.calibrators
         info: |
             Swap H and V polarization labels and set the feed offset angle to zero for the calibrators-only measurement set
         params:
            ms_path: =recipe.steps.transform1-split_ms.outputvis 
         skip: =IF(recipe.prepare.calibrators.enable, IF(recipe.prepare.calibrators.swap_labels.enable, false, true),true) 
                  
      prepare-clearcal:
         _use: lib.steps.prepdata.clearcal.calibrators
         info: |
             Re-initialize calibrated visibility data in the calibrator-only ms
         params:
            spw: ''
         skip: =IF(recipe.prepare.calibrators.enable, IF(recipe.prepare.calibrators.clearcal.enable, false, true),true)
         
      prepare-delete2_flags:
         _use: lib.steps.prepdata.flagmanager.delete.calibrators
         info: |
             Delete the backed up flags
         params:
            versionname: 'swapped-calflags'
         skip: =IF(recipe.prepare.calibrators.enable,false,true)          
           
      prepare-save_flags2:
         _use: lib.steps.prepdata.flagmanager.save.calibrators
         info: |
             Backed up flags
         params:
            versionname: 'swapped-calflags'
         skip: =IF(recipe.prepare.calibrators.enable,false,true) 
         
      prepare-restore_flags:
         _use: lib.steps.prepdata.flagmanager.restore.calibrators
         info: |
             Delete the backed up flags
         params:
            versionname: 'unswapped-calflags'
         skip: =IF(recipe.prepare.calibrators.enable, IF(recipe.prepare.calibrators.flag.restore.enable, false, true),true) 
         
      delete-preflags:
         _use: lib.steps.flagmanager.delete.calibrators
         info: |
             Delete existing pre-calflags before running flagdata 
         params:
            versionname: 'pre-calflags'
         skip: =IF(recipe.flag.calibrators.enable, false,true)          
                    
      save-preflags:
         _use: lib.steps.flagmanager.save.calibrators
         info: |
             Back up existing flags before running flagdata on the calibrator fields
         params:
            versionname: 'pre-calflags'
            comment: 'calibrator-fields flags before flagdata'
         skip: =IF(recipe.flag.calibrators.enable, false,true)
         
      flag-autocorr: 
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Flag only the auto correlations. When set to True, it will only flag data from a processor of type CORRELATOR.
         params: 
            autocorr: true
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.autocorr.enable, false, true),true),true)
                  
      flag-shadow:
         _use: lib.steps.flagdata.shadow.calibrators
         info: |
             Remove antenna-shadowed data
         params:
            spw: ''
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.shadow.enable, false, true),true),true)
                  
      flag-elevation:
         _use: lib.steps.flagdata.elevation.calibrators
         info: |
             Flag antenna with pointing elevation outside the selected range
         params:
            spw: ''
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.elevation.enable, false, true),true),true)
                        
      flag-quack:
         _use: lib.steps.flagdata.quack.calibrators
         info:  |
             Flag data at the start and end of the scans.
         params: 
            spw: '' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.quack.enable, false, true),true),true)
                  
      flag-zeros:
         _use: lib.steps.flagdata.clip.zeros.calibrators
         info: |
             Flag zero valued data. 
         params: 
            spw: ''
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.clip.zeros.enable, false,true),true),true)
                  
      flag-extremes:
         _use: lib.steps.flagdata.clip.extremes.calibrators
         info: |
              Flag very extreme outliers
         params:
            spw: ''
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.clip.extremes.enable, false,true),true),true)
                  
      flag-edges:
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Flag bandpass edges and galactic plane
         params: 
            spw:  =recipe.flag.edges.spw      
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.edges.enable, false, true),true),true)
         
      summary-basicflags:
         _use: lib.steps.flagdata.summary.calibrators
         info: |
             Generate a summary of flagged data after basic flagging
         params: 
            mode: 'summary'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.summary.enable, false, true),true),true) 
         
      delete-basicflags:
         _use: lib.steps.flagmanager.delete.calibrators
         info: |
             Completely delete basicflags flag version
         params:
            versionname: 'basic-calflags'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, false,true),true) 
        
      save-basicflags:
         _use: lib.steps.flagmanager.save.calibrators
         info: |
             Back up the basic flags before running RFI mask
         params:
            versionname: 'basic-calflags'
            comment: 'calibrator flags after basic flagging'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, false,true),true)
         
      restore-basicflags:
         _use: lib.steps.flagmanager.restore.calibrators
         info: |
             Restore the previous version prior to basic flagging
         params:
            versionname: =recipe.steps.save-preflags.versionname
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.basic.enable, IF(recipe.flag.calibrators.basic.restore.enable, false,true),true),true)  
         
      rfimask:
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Mask known RFI regions (GSM and aviation,GPS,Galilleo,Irridium,Inmarsat,Afristar etc)
         params:
            spw: =recipe.rfimask.spw
            uvrange: =IFSET(recipe.flag.calibrators.rfimask.uvrange ,recipe.flag.calibrators.rfimask.uvrange, '0~1000')
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfimask.enable, false, true),true)  
         
      summary-rfimask:
         _use: lib.steps.flagdata.summary.calibrators
         info: |
             Generate a summary of flagged data after rfi-masking
         params: 
            mode: 'summary' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfimask.enable, IF(recipe.flag.calibrators.rfimask.summary.enable, false, true),true),true) 
         
      delete-rfimask:
         _use: lib.steps.flagmanager.delete.calibrators
         info: |
             Completely delete rfimask flags
         params:
            versionname: 'rfimask-calflags'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfimask.enable, false,true),true)
         
      save-rfimask:
         _use: lib.steps.flagmanager.save.calibrators
         info: |
             Back up flags before running RFI flagging
         params:
            versionname: 'rfimask-calflags'
            comment: 'calibrator flags after masking rfi'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfimask.enable, false,true),true)
         
      restore-rfimask:
         _use: lib.steps.flagmanager.restore.calibrators
         info: |
             Restore the previous version prior to rfimask flagging
         params:
            versionname: =recipe.steps.save-basicflags.versionname
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfimask.enable, IF(recipe.flag.calibrators.rfimask.restore.enable, false,true),true),true) 
         
      rfiflags-1:
         _use: lib.steps.flagdata.tricolour.calibrators
         info: |
             Auto flag RFI using tricolour
         params:
            config: xgc-reborn_data/tricolour/{recipe.band}/{recipe.flag.calibrators.rfi.tricolour.config} 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, IF(recipe.flag.calibrators.rfi.flagger=="tricolour",false,true),true),true) 
         
      rfiflags-2:
         _use: lib.steps.flagdata.tfcrop.calibrators
         info: |
             Auto flag RFI using tfcrop
         params: 
            spw: ''
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, IF(recipe.flag.calibrators.rfi.flagger=="tfcrop",false,true),true),true) 
         
      summary-rfiflags:
         _use: lib.steps.flagdata.summary.calibrators
         info: |
             Generate a summary of flagged data after auto-flag
         params: 
            mode: 'summary' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, IF(recipe.flag.calibrators.rfi.summary.enable, false, true),true),true)
         
      inspect-rfiflags:
         _use: lib.steps.flagdata.inspect.calibrators
         info: |
             Plotting Amplitude against Frequency  for inspection for rfi peaks
         params:
            dir: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/flagging' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, IF(recipe.flag.calibrators.rfi.inspect.enable, false, true),true),true)
         
      delete-rfiflags:
         _use: lib.steps.flagmanager.delete.calibrators
         info: | 
             Completely delete rfi flags
         params:
            versionname: 'rfiflags-calflags' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, false,true),true)
         
      save-rfiflags:
         _use: lib.steps.flagmanager.save.calibrators
         info: |
             Back up any flags after running rfi flagging
         params:
            versionname: 'rfiflags-calflags' 
            comment: 'calibrator flags after rfi flagging'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, false, true),true)
         
      restore-rfiflags:
         _use: lib.steps.flagmanager.restore.calibrators
         info: |
             Restore the previous flag version
         params:
            versionname: =recipe.steps.save-rfimask.versionname
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.rfi.enable, IF(recipe.flag.calibrators.rfi.restore.enable, false,true),true),true)
         
      flag-spw: 
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Manually flag bad spw
         params: 
            spw: =recipe.flag.calibrators.manual.spw.spw
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.spw.enable, false, true),true),true)
         
      flag-scan: 
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Manually flag bad scans
         params: 
            scan: =recipe.flag.calibrators.manual.scan.scan
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.scan.enable, false, true),true),true)
         
      flag-field: 
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Manually flag field(s)
         params: 
            field: =IFSET(recipe.flag.calibrators.manual.field.field, recipe.flag.calibrators.manual.field.field, '{recipe.steps.=recipe.steps.transform-split_ms.field.field}') 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.field.enable, false, true),true),true)
         
      flag-timerange: 
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Manually flag bad timeranges
         params: 
            timerange: =recipe.flag.calibrators.manual.timerange.timerange
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.timerange.enable, false, true),true),true)
       
      flag-antenna: 
         _use: lib.steps.flagdata.manual.calibrators
         info: |
             Manually flag bad antenna
         params: 
            antenna: =recipe.flag.calibrators.manual.antenna.antenna
            timerange: =recipe.flag.calibrators.manual.antenna.timerange
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.antenna.enable, false, true),true),true) 
         
      summary-manualflags:
         _use: lib.steps.flagdata.summary.calibrators
         info: |
             Generate a summary of flagged data after manually flagging other bad data
         params: 
            mode: 'summary' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.summary.enable, false, true),true),true)   
      
      inspect-manualflags:
         _use: lib.steps.flagdata.inspect.calibrators
         info: |
             Plotting Amplitude against Frequency  for inspection for rfi peaks
         params:
            dir: =STRIPEXT(BASENAME(recipe.ms-path)) + '/' + '{recipe.crosscal.calibrate-with}/output/flagging' 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.inspect.enable, false, true),true),true)
         
      delete-manualflags:
         _use: lib.steps.flagmanager.delete.calibrators
         info: |
             Completely delete manual flags
         params:
            versionname: 'manual-calflags'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, false,true),true)
         
      save-manualflags:
         _use: lib.steps.flagmanager.save.calibrators
         info: |
             Back up any flags after manually flagging data
         params:
            versionname:  'manual-calflags'
            comment: 'calibrator flags after manual flagging'
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, false, true),true)
         
      restore-manualflags:
         _use: lib.steps.flagmanager.restore.calibrators
         info: |
            Restore the manual flags
         params:
            versionname: =recipe.steps.save-rfiflags.versionname
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.manual.enable, IF(recipe.flag.calibrators.manual.restore.enable, false,true),true),true)
         
      unflag-spw:
         _use: lib.steps.flagdata.unflag.calibrators 
         info: |
             Unflag data based on selected spw
         params:
            spw: =recipe.steps.flag-spw.spw 
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.unflag.enable, IF(recipe.flag.calibrators.unflag.spw.enable, false, true),true),true)
                 
      unflag-scan:
         _use: lib.steps.flagdata.unflag.calibrators 
         info: |
             Unflag data based on selected parameters, field,spw,antenna etc
         params:
            scan: =recipe.steps.flag-scan.scan
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.unflag.enable, IF(recipe.flag.calibrators.unflag.scan.enable, false, true),true),true)
                  
      unflag-timerange:
         _use: lib.steps.flagdata.unflag.calibrators 
         info: |
             Unflag data based on selected parameters, field,spw,antenna etc
         params:
            timerange: =recipe.steps.flag-timerange.timerange
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.unflag.enable, IF(recipe.flag.calibrators.unflag.timerange.enable, false, true),true),true)
                
      unflag-antenna:
         _use: lib.steps.flagdata.unflag.calibrators 
         info: |
             Unflag data based on selected parameters, field,spw,antenna etc
         params:
            antenna: =recipe.steps.flag-antenna.antenna
            timerange: =recipe.steps.flag-antenna.timerange
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.unflag.enable, IF(recipe.flag.calibrators.unflag.antenna.enable, false, true),true),true)
         
      unflag-field:
         _use: lib.steps.flagdata.unflag.calibrators 
         info: | 
             Unflag data based on selected parameters, field,spw,antenna etc
         params:
            field: =recipe.steps.transform1-split_ms.field  
         skip: =IF(recipe.flag.calibrators.enable, IF(recipe.flag.calibrators.unflag.enable, IF(recipe.flag.calibrators.unflag.field.enable, false, true),true),true)
         
      delete-postflags:
         _use: lib.steps.flagmanager.delete.calibrators
         info: |
             Completely delete unflags
         params:
            versionname: 'post-calflags'
         skip: =IF(recipe.flag.calibrators.enable, false,true)
                  
      save-postflags:
         _use: lib.steps.flagmanager.save.calibrators
         info: |
             Back up any flags after running flagdata
         params:
            versionname: 'post-calflags'
