  outdir-path:
      info: Path to the output directory in which the pipeline should store inputs results.
      dtype: Directory
      mkdir: true
     
  indir:
      dtype: Directory
      info: Directory of input files
      default: '{current.dirs.base}/{current.outdir-path}/input'
      mkdir: true
      
  msdir:
      dtype: Directory
      info: Directory of split ms
      default: '{current.dirs.base}/{current.outdir-path}/msdir'
      mkdir: true
      
  outdir:
      dtype: Directory
      info: Directory of output products 
      default: '{current.dirs.base}/{current.outdir-path}/output'
      mkdir: true
      
  logdir:
     dtype: Directory
     info: Directory of output logs 
     default: '{current.outdir}/logs'
     mkdir: true 
          
  imdir:
